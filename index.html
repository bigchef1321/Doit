<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Tâches</title>
<style>
:root{
--bg:#f5f5f7;
--card:#ffffff;
--text:#1d1d1f;
--secondary:#6e6e73;
--accent:#2e7d32;
--border:#e5e5ea;
--danger:#ff3b30;
--radius:16px;
--shadow:0 6px 20px rgba(0,0,0,0.08);
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",Arial,sans-serif;
}

@media (prefers-color-scheme:dark){
:root{
--bg:#000;
--card:#1c1c1e;
--text:#fff;
--secondary:#98989d;
--border:#2c2c2e;
}
}

body{
margin:0;
background:var(--bg);
color:var(--text);
}

header{
padding:18px 20px 8px;
font-size:28px;
font-weight:700;
}

.search{
padding:0 16px 12px;
}

.search input{
width:100%;
padding:12px 14px;
border-radius:12px;
border:none;
background:var(--card);
box-shadow:var(--shadow);
font-size:16px;
}

.filters{
display:flex;
overflow-x:auto;
gap:8px;
padding:6px 16px 12px;
}

.filter{
padding:8px 14px;
border-radius:999px;
background:var(--card);
border:1px solid var(--border);
font-size:14px;
white-space:nowrap;
cursor:pointer;
}

.filter.active{
background:var(--accent);
color:#fff;
border:none;
}

.list{
padding:0 12px 90px;
}

.task{
background:var(--card);
padding:14px 16px;
border-radius:var(--radius);
margin-bottom:10px;
box-shadow:var(--shadow);
display:flex;
flex-direction:column;
gap:6px;
cursor:pointer;
}

.task-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.priority{
font-size:12px;
padding:4px 8px;
border-radius:6px;
color:#fff;
}

.p1{background:#ff3b30}
.p2{background:#ff9f0a}
.p3{background:#34c759}

.date{
font-size:13px;
color:var(--secondary);
}

.fab{
position:fixed;
bottom:30px;
right:20px;
width:58px;
height:58px;
border-radius:50%;
border:none;
background:var(--accent);
color:#fff;
font-size:32px;
box-shadow:var(--shadow);
cursor:pointer;
}

.screen{
display:none;
padding-bottom:40px;
}

.screen.active{
display:block;
}

.back{
padding:16px;
font-size:16px;
color:var(--accent);
cursor:pointer;
}

.form{
padding:0 16px;
display:flex;
flex-direction:column;
gap:12px;
}

input,textarea,select{
font-size:16px;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
}

textarea{min-height:80px}

button.primary{
padding:14px;
background:var(--accent);
border:none;
border-radius:12px;
color:#fff;
font-size:16px;
}

button.delete{
background:var(--danger);
color:#fff;
border:none;
padding:12px;
border-radius:10px;
}

.attachments{
display:flex;
gap:10px;
overflow-x:auto;
}

.attachments img{
height:90px;
border-radius:10px;
}

.viewer{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#000;
display:none;
justify-content:center;
align-items:center;
z-index:10;
}

.viewer img{
max-width:100%;
max-height:100%;
}

</style>
</head>
<body>

<div id="viewer" class="viewer" onclick="closeViewer()">
<img id="viewerImg">
</div>

<div id="listScreen" class="screen active">
<header>Tâches</header>

<div class="search">
<input id="search" placeholder="Rechercher">
</div>

<div class="filters">
<div class="filter active" onclick="setFilter('all',this)">Toutes</div>
<div class="filter" onclick="setFilter('todo',this)">À faire</div>
<div class="filter" onclick="setFilter('doing',this)">En cours</div>
<div class="filter" onclick="setFilter('done',this)">Terminées</div>
</div>

<div id="taskList" class="list"></div>

<button class="fab" onclick="openForm()">+</button>
</div>

<div id="formScreen" class="screen">
<div class="back" onclick="showList()">← Retour</div>

<div class="form">
<input id="title" placeholder="Titre">
<textarea id="desc" placeholder="Description"></textarea>

<select id="status">
<option value="todo">À faire</option>
<option value="doing">En cours</option>
<option value="done">Terminée</option>
</select>

<select id="priority">
<option value="1">Priorité haute</option>
<option value="2">Priorité moyenne</option>
<option value="3">Priorité basse</option>
</select>

<input type="date" id="date">

<input type="file" id="files" multiple accept="image/*">

<div id="preview" class="attachments"></div>

<button class="primary" onclick="saveTask()">Valider</button>
<button class="delete" onclick="deleteTask()">Supprimer</button>
</div>
</div>

<script>
let tasks=JSON.parse(localStorage.getItem("tasks")||"[]")
let current=null
let filter="all"

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks))
}

function render(){
let list=document.getElementById("taskList")
list.innerHTML=""

let search=document.getElementById("search").value.toLowerCase()

let sorted=[...tasks].sort((a,b)=>a.priority-b.priority||new Date(a.date)-new Date(b.date))

sorted.forEach((t,i)=>{

if(filter!="all" && t.status!=filter)return

if(!t.title.toLowerCase().includes(search))return

let div=document.createElement("div")

div.className="task"

div.onclick=()=>editTask(i)

let prClass="p"+t.priority

let pLabel=["","Haute","Moyenne","Basse"][t.priority]

div.innerHTML=`
<div class="task-top">
<strong>${t.title}</strong>
<span class="priority ${prClass}">${pLabel}</span>
</div>
<div class="date">${t.date||""}</div>
`

list.appendChild(div)
})
}

function openForm(){
current=null
show("formScreen")
clearForm()
}

function editTask(i){
current=i
let t=tasks[i]

show("formScreen")

document.getElementById("title").value=t.title

document.getElementById("desc").value=t.desc

document.getElementById("status").value=t.status

document.getElementById("priority").value=t.priority

document.getElementById("date").value=t.date

showImages(t.images||[])
}

function clearForm(){
document.getElementById("title").value=""
document.getElementById("desc").value=""
document.getElementById("date").value=""
document.getElementById("preview").innerHTML=""
}

function saveTask(){
let t={

title:title.value,
desc:desc.value,
status:status.value,
priority:Number(priority.value),
date:date.value,
images:tasks[current]?.images||[]

}

let files=document.getElementById("files").files

if(files.length){
let readers=[...files].map(file=>new Promise(res=>{
let r=new FileReader()
r.onload=e=>res(e.target.result)
r.readAsDataURL(file)
}))

Promise.all(readers).then(imgs=>{
t.images=t.images.concat(imgs)
finishSave(t)
})
}else{
finishSave(t)
}
}

function finishSave(t){
if(current!=null)tasks[current]=t
else tasks.push(t)

save()
showList()
}

function deleteTask(){
if(current!=null){
tasks.splice(current,1)
save()
showList()
}
}

function show(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function showList(){
show("listScreen")
render()
}

function setFilter(f,el){
filter=f

document.querySelectorAll(".filter").forEach(b=>b.classList.remove("active"))

el.classList.add("active")

render()
}

function showImages(images){
let p=document.getElementById("preview")
p.innerHTML=""

images.forEach(src=>{
let img=document.createElement("img")
img.src=src
img.onclick=()=>openViewer(src)
p.appendChild(img)
})
}

function openViewer(src){
viewer.style.display="flex"
viewerImg.src=src
}

function closeViewer(){
viewer.style.display="none"
}

search.oninput=render

render()
</script>

</body>
</html>
